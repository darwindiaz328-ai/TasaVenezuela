name: Monitor de Tasas Automatizado

on:
  schedule:
    # Se ejecuta de forma automática al inicio de cada hora para mantener la fecha al día
    - cron: '0 * * * *'
  workflow_dispatch: # Activa el botón manual en la pestaña Actions

permissions:
  contents: write

jobs:
  ejecutar_robot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Inicializar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias esenciales
        run: |
          pip install requests beautifulsoup4

      - name: Ejecutar Extractor de Precios
        run: python update_rates.py

      - name: Publicar cambios en el repositorio de forma segura
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Servidor actualizó tasas y marcas de tiempo automáticamente"
          file_pattern: 'Datos/rates.json'
