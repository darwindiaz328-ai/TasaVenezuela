name: Monitor de Tasas Automatizado

on:
  schedule:
    # Se ejecuta automáticamente cada 2 horas (puedes cambiarlo)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Te permite seguir activándolo manualmente si quieres

permissions:
  contents: write

jobs:
  update_rates:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4

      - name: Ejecutar Robot
        run: python update_rates.py

      - name: Guardar cambios automáticamente
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Tasas actualizadas automáticamente por el Robot"
          file_pattern: 'Datos/rates.json'
